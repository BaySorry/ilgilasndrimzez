<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engin Translator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap');
  :root {
    --bg: #0a0a0f; --surface: #111118; --border: #1e1e2e;
    --accent: #00ff88; --accent2: #ff3366; --text: #e0e0e0; --muted: #555570;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:var(--bg); color:var(--text); font-family:'Space Mono',monospace;
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    padding:40px 20px; overflow-x:hidden;
  }
  body::before {
    content:''; position:fixed; top:0; left:0; width:100%; height:100%;
    background: radial-gradient(ellipse at 20% 20%,rgba(0,255,136,.05) 0%,transparent 50%),
                radial-gradient(ellipse at 80% 80%,rgba(255,51,102,.05) 0%,transparent 50%);
    pointer-events:none; z-index:0;
  }
  body::after {
    content:''; position:fixed; inset:0;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);
    pointer-events:none; z-index:9999;
  }
  .container { width:100%; max-width:720px; position:relative; z-index:1; }
  header { text-align:center; margin-bottom:40px; }
  .logo {
    font-family:'Bebas Neue',cursive; font-size:clamp(52px,12vw,92px);
    letter-spacing:6px; line-height:1; color:var(--accent);
    text-shadow:0 0 30px rgba(0,255,136,.35); animation:flicker 5s infinite;
  }
  .logo .red { color:var(--accent2); text-shadow:0 0 30px rgba(255,51,102,.4); }
  @keyframes flicker { 0%,93%,97%,100%{opacity:1} 94%,96%{opacity:.7} 95%{opacity:.4} }
  .tagline { font-size:10px; color:var(--muted); letter-spacing:4px; text-transform:uppercase; margin-top:10px; }
  .badge {
    display:flex; align-items:center; gap:14px; padding:14px 18px;
    background:rgba(0,255,136,.04); border:1px solid rgba(0,255,136,.14);
    border-radius:4px; margin-bottom:20px;
  }
  .avatar {
    width:42px; height:42px; border-radius:50%;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex; align-items:center; justify-content:center;
    font-family:'Bebas Neue',cursive; font-size:17px; color:var(--bg); flex-shrink:0;
  }
  .badge-name { font-size:13px; font-weight:700; color:var(--accent); }
  .badge-sub { font-size:10px; color:var(--muted); margin-top:3px; letter-spacing:1px; }
  .status { width:8px; height:8px; background:var(--accent); border-radius:50%; margin-left:auto; flex-shrink:0; animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.75)} }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:4px; padding:22px; margin-bottom:14px; }
  .card-label { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--muted); margin-bottom:12px; display:flex; align-items:center; gap:8px; }
  .card-label::after { content:''; flex:1; height:1px; background:var(--border); }
  textarea { width:100%; background:transparent; border:none; outline:none; color:var(--text); font-family:'Space Mono',monospace; font-size:14px; line-height:1.7; resize:none; }
  textarea::placeholder { color:var(--muted); }
  .btn {
    width:100%; padding:15px; background:transparent; border:1px solid var(--accent);
    color:var(--accent); font-family:'Bebas Neue',cursive; font-size:22px; letter-spacing:5px;
    cursor:pointer; border-radius:2px; position:relative; overflow:hidden; transition:color .2s;
  }
  .btn::before { content:''; position:absolute; inset:0; background:var(--accent); transform:translateX(-101%); transition:transform .22s ease; z-index:0; }
  .btn:hover:not(:disabled)::before { transform:translateX(0); }
  .btn:hover:not(:disabled) { color:var(--bg); }
  .btn span { position:relative; z-index:1; }
  .btn:disabled { border-color:var(--muted); color:var(--muted); cursor:not-allowed; }
  .output-card {
    background:var(--surface); border:1px solid var(--accent); border-radius:4px; padding:22px;
    margin-top:14px; box-shadow:0 0 24px rgba(0,255,136,.15); display:none; position:relative;
    animation:slideIn .3s ease;
  }
  @keyframes slideIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .output-text { font-size:15px; line-height:1.85; white-space:pre-wrap; word-break:break-word; }
  .copy-btn {
    position:absolute; top:14px; right:14px; background:transparent;
    border:1px solid var(--border); color:var(--muted); font-family:'Space Mono',monospace;
    font-size:10px; letter-spacing:1px; padding:4px 10px; cursor:pointer; border-radius:2px; transition:all .2s;
  }
  .copy-btn:hover { border-color:var(--accent); color:var(--accent); }
  .dots { display:flex; align-items:center; gap:5px; }
  .dots span { display:inline-block; width:6px; height:6px; background:var(--accent); border-radius:50%; animation:dotBounce 1.1s infinite; }
  .dots span:nth-child(2){animation-delay:.18s} .dots span:nth-child(3){animation-delay:.36s}
  @keyframes dotBounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
  .loading-row { display:flex; align-items:center; gap:12px; color:var(--muted); font-size:11px; letter-spacing:2px; }
  .error { color:var(--accent2); font-size:13px; }
  footer { text-align:center; margin-top:52px; font-size:10px; color:var(--muted); letter-spacing:2px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">ENGİN<span class="red">TRANSLATE</span></div>
    <div class="tagline">her cümleyi engin tarzına çevirir • powered by groq ai</div>
  </header>
  <div class="badge">
    <div class="avatar">AEK</div>
    <div>
      <div class="badge-name">Ahmet Engin Kaya</div>
      <div class="badge-sub">// dc gel • knk • niga • hayda • oh hell nah • amk ya //</div>
    </div>
    <div class="status"></div>
  </div>
  <div class="card">
    <div class="card-label">// input — normal metin</div>
    <textarea id="inputText" placeholder="buraya normal bir şey yaz mesela... 'merhaba bugün nasılsın'" rows="4"></textarea>
  </div>
  <button class="btn" id="translateBtn"><span>ÇEVİR</span></button>
  <div class="output-card" id="outputCard">
    <div class="card-label">// output — engin tarzı</div>
    <button class="copy-btn" id="copyBtn">kopyala</button>
    <div class="output-text" id="outputText"></div>
  </div>
</div>
<footer>// engin translator • ctrl+enter ile de çevirirsin //</footer>
<script>
const API_KEY = "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";

const SYSTEM_PROMPT = `Sen Ahmet Engin Kaya adlı birinin konuşma tarzını mükemmel bilen bir çevirmenisin. Kullanıcının yazdığı normal Türkçe metni, Ahmet Engin Kaya'nın tam konuşma tarzına çevireceksin.

Ahmet Engin Kaya'nın konuşma tarzının kesin özellikleri:
- Çok kısa ve kesik cümleler. Asla uzun açıklama yapmaz.
- "niga", "aga", "knk", "amk", "lan" gibi kelimeler sık kullanır
- İngilizce-Türkçe karışımı: "oh hell nah", "wtf", "ok", "nah", "idc", "bb", "lil bro" gibi
- "hayda" tepkisi sürpriz/saçma durumlar için
- Tehditler: "cracklicem", "grapelerim", "banlarim", "sikayet edicem"
- "sanirim", "herhalde", "bilmiyom" gibi belirsizlik ifadeleri
- Yazım hataları: "gelicm", "diyodum", "cikiyom"
- Büyük harf neredeyse hiç yok, noktalama çok az
- Dalga geçme: "lil bro", "you will never glow up", "scammed"
- "eyw", "hayda", "oha" gibi kısa tepkiler
- Bazen emoji: 🥀✌️💀
- "evet" yerine "evt" der
- Bazen sadece tek kelime: "yok", "gel", "ok", "nah"
- "amk ya" gibi şikayet ifadeleri

SADECE çeviriyi yaz, hiçbir açıklama ekleme.`;

const btn = document.getElementById('translateBtn');
const copyBtn = document.getElementById('copyBtn');
const outputCard = document.getElementById('outputCard');
const outputText = document.getElementById('outputText');

async function translate() {
  const input = document.getElementById('inputText').value.trim();
  if (!input) return;

  btn.disabled = true;
  outputCard.style.display = 'block';
  outputText.innerHTML = '<div class="loading-row"><div class="dots"><span></span><span></span><span></span></div><span>ÇEVİRİLİYOR</span></div>';

  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + API_KEY
      },
      body: JSON.stringify({
        model: 'llama-3.1-8b-instant',
        messages: [
          { role: 'system', content: SYSTEM_PROMPT },
          { role: 'user', content: 'Şunu Engin tarzına çevir: "' + input + '"' }
        ],
        max_tokens: 500,
        temperature: 0.9
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || 'api hata');
    outputText.textContent = data.choices?.[0]?.message?.content ?? 'amk hata oldu';
  } catch (e) {
    outputText.innerHTML = '<span class="error">hata knk: ' + e.message + '</span>';
  }

  btn.disabled = false;
}

function copyOutput() {
  navigator.clipboard.writeText(outputText.textContent).then(() => {
    copyBtn.textContent = 'kopyalandı ✓';
    copyBtn.style.color = '#00ff88';
    copyBtn.style.borderColor = '#00ff88';
    setTimeout(() => { copyBtn.textContent='kopyala'; copyBtn.style.color=''; copyBtn.style.borderColor=''; }, 2000);
  });
}

btn.addEventListener('click', translate);
copyBtn.addEventListener('click', copyOutput);
document.getElementById('inputText').addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.ctrlKey) translate();
});
</script>
</body>
</html>
