<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engin Translator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #00ff88;
    --accent2: #ff3366;
    --text: #e0e0e0;
    --muted: #555570;
    --glow: 0 0 20px rgba(0,255,136,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(0,255,136,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(255,51,102,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 760px;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
  }

  .logo {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(48px, 10vw, 88px);
    letter-spacing: 6px;
    line-height: 1;
    color: var(--accent);
    text-shadow: var(--glow);
    animation: flicker 4s infinite;
  }

  .logo span {
    color: var(--accent2);
    text-shadow: 0 0 20px rgba(255,51,102,0.4);
  }

  @keyframes flicker {
    0%, 94%, 98%, 100% { opacity: 1; }
    95%, 97% { opacity: 0.85; }
    96% { opacity: 0.6; }
  }

  .tagline {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: 8px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 24px;
    margin-bottom: 16px;
    position: relative;
  }

  .card-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  textarea {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 15px;
    line-height: 1.7;
    resize: none;
    min-height: 100px;
  }

  textarea::placeholder {
    color: var(--muted);
  }

  .btn {
    width: 100%;
    padding: 16px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Bebas Neue', cursive;
    font-size: 22px;
    letter-spacing: 4px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.2s;
    border-radius: 2px;
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform: translateX(-100%);
    transition: transform 0.25s ease;
    z-index: 0;
  }

  .btn:hover::before { transform: translateX(0); }
  .btn:hover { color: var(--bg); }
  .btn span { position: relative; z-index: 1; }

  .btn:disabled {
    border-color: var(--muted);
    color: var(--muted);
    cursor: not-allowed;
  }
  .btn:disabled::before { display: none; }

  .output-card {
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 4px;
    padding: 24px;
    margin-top: 16px;
    box-shadow: var(--glow);
    display: none;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .output-text {
    font-size: 15px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .loading {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 2px;
  }

  .dots span {
    display: inline-block;
    animation: bounce 1.2s infinite;
    color: var(--accent);
    font-size: 18px;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  .copy-btn {
    position: absolute;
    top: 16px;
    right: 16px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 2px;
  }

  .copy-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .profile-badge {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    padding: 12px 16px;
    background: rgba(0,255,136,0.05);
    border: 1px solid rgba(0,255,136,0.15);
    border-radius: 4px;
  }

  .avatar {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', cursive;
    font-size: 18px;
    color: var(--bg);
    flex-shrink: 0;
  }

  .profile-info {
    flex: 1;
  }

  .profile-name {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
  }

  .profile-desc {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
    letter-spacing: 1px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
    flex-shrink: 0;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  footer {
    text-align: center;
    margin-top: 48px;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
  }

  .error-text {
    color: var(--accent2);
    font-size: 13px;
  }

  /* Scanline effect */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.05) 2px,
      rgba(0,0,0,0.05) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">ENGİN<span>TRANSLATE</span></div>
    <div class="tagline">her cümleyi engin tarzına çevirir • powered by claude</div>
  </header>

  <div class="profile-badge">
    <div class="avatar">AEK</div>
    <div class="profile-info">
      <div class="profile-name">Ahmet Engin Kaya</div>
      <div class="profile-desc">// dc gel • knk • niga • hayda • oh hell nah • amk ya //</div>
    </div>
    <div class="status-dot"></div>
  </div>

  <div class="card">
    <div class="card-label">// input — normal metin</div>
    <textarea id="inputText" placeholder="buraya normal bir şey yaz mesela... 'merhaba bugün nasılsın'" rows="4"></textarea>
  </div>

  <button class="btn" id="translateBtn">
    <span>ÇEVİR</span>
  </button>

  <div class="output-card" id="outputCard">
    <div class="card-label">// output — engin tarzı</div>
    <button class="copy-btn" id="copyBtn">kopyala</button>
    <div class="output-text" id="outputText"></div>
  </div>
</div>

<footer>
  // engin translator v1.0 // analiz: ~2500+ mesaj //
</footer>

<script>
async function doTranslate() {
  const input = document.getElementById('inputText').value.trim();
  if (!input) return;

  const btn = document.getElementById('translateBtn');
  const outputCard = document.getElementById('outputCard');
  const outputText = document.getElementById('outputText');

  btn.disabled = true;
  outputCard.style.display = 'block';
  outputText.innerHTML = '<div class="loading"><div class="dots"><span>▪</span><span>▪</span><span>▪</span></div> <span style="letter-spacing:2px">ÇEVİRİLİYOR</span></div>';

  const systemPrompt = `Sen Ahmet Engin Kaya'nın konuşma tarzını mükemmel bilen bir çevirmenisin. Kullanıcının yazdığı normal Türkçe metni, Ahmet Engin Kaya'nın tam konuşma tarzına çevireceksin.

Ahmet Engin Kaya'nın konuşma tarzının kesin özellikleri:
- Çok kısa ve kesik cümleler. Asla uzun açıklama yapmaz.
- "niga", "nigga", "aga", "knk" (kanka), "amk", "bruh", "bro", "lan" gibi kelimeler sık kullanır
- İngilizce-Türkçe karışımı: "oh hell nah", "wtf", "ok", "nah", "idc", "wdym", "bb", "lil bro", "gel dc" gibi
- "hayda" tepkisi sürpriz/saçma durumlar için
- Tehditler: "cracklicem", "grapelerim", "banlarim", "sikayet edicem"
- "sanirim", "herhalde", "bilmiyom" gibi belirsizlik ifadeleri
- Yazım hataları kasıtlı değil, hızlı yazıyor: "gelicm", "diyodum", "cikiyom", "gelirim"
- Büyük harf neredeyse hiç yok, noktalama çok az
- Dalga geçme tarzı: "lil bro", "you will never glow up", "scammed"
- "eyw", "hayda", "oha" gibi kısa tepkiler
- Bazen emoji: 🥀✌️💀
- Cümleleri yarım bırakır bazen, anlaşılır ama eksik
- "evet" yerine "evet ya" veya sadece "evt" der
- Bazen sadece tek kelime cevap verir: "yok", "gel", "ok", "nah"
- "amk ya" gibi şikayet ifadeleri
- Oyun konuşması çok: "dc gel", "ranked", "knk"

Çeviriyi yaparken:
- Kesinlikle bu tarzda olmalı, abartma ama özünü koru
- Birden fazla cümle yazabilirsin ama hepsi kısa olmalı
- Doğal görünmeli, robot gibi değil
- SADECE çeviriyi yaz, açıklama yapma`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: "user", content: `Şunu Engin tarzına çevir: "${input}"` }]
      })
    });

    const data = await response.json();
    if (!response.ok) {
      console.error("API error:", data);
      outputText.innerHTML = '<span class="error-text">api hata verdi amk. knk tekrar dene</span>';
      btn.disabled = false;
      return;
    }
    const result = data.content?.[0]?.text || "amk bir hata oldu";
    outputText.textContent = result;
  } catch (err) {
    console.error("Fetch error:", err);
    outputText.innerHTML = '<span class="error-text">amk bir şeyler ters gitti. knk tekrar dene ya</span>';
  }

  btn.disabled = false;
}

function doCopy() {
  const text = document.getElementById('outputText').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'kopyalandı ✓';
    setTimeout(() => btn.textContent = 'kopyala', 2000);
  });
}

document.getElementById('translateBtn').addEventListener('click', doTranslate);
document.getElementById('copyBtn').addEventListener('click', doCopy);
document.getElementById('inputText').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && e.ctrlKey) doTranslate();
});
</script>
</body>
</html>
